<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} | Premium Tasks</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #0f172a; --card-bg: #1e293b; --text-main: #f8fafc; --primary: #6366f1; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        .auth-container { background-color: var(--card-bg); width: 100%; max-width: 400px; border-radius: 24px; padding: 2.5rem; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.05); text-align: center; }
        h1 { margin-top: 0; margin-bottom: 1.5rem; }
        .helptext, ul { display: none; } /* Hide Django default form clutter */
        p { margin-bottom: 1rem; text-align: left; }
        label { font-size: 0.9rem; margin-bottom: 0.5rem; display: block; color: #94a3b8; }
        input { width: 100%; background: #0f172a; border: 1px solid rgba(255,255,255,0.1); padding: 12px; border-radius: 8px; color: white; margin-bottom: 1rem; box-sizing: border-box; font-family: inherit; }
        button { background: var(--primary); color: white; border: none; border-radius: 8px; padding: 12px; width: 100%; font-size: 1rem; cursor: pointer; font-weight: 600; margin-top: 1rem; }
        a { color: var(--primary); text-decoration: none; font-size: 0.9rem; display: block; margin-top: 1.5rem; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="auth-container">
        <h1>{{ title }}</h1>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">{{ title }}</button>
        </form>
        <a href="{% url link %}">{{ link_text }}</a>
    </div>
</body>
</html>
