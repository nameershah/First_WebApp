<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Task HUD</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --neon-cyan: #00f3ff;
            --neon-pink: #ff00ea;
            --dark-bg: #050510;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background-color: var(--dark-bg);
            color: var(--neon-cyan);
            font-family: 'Orbitron', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
        }
        
        /* 3D Moving Grid Background */
        .grid-floor {
            position: absolute;
            bottom: -50%;
            left: -50%;
            width: 200%;
            height: 150%;
            background-image: 
                linear-gradient(to right, rgba(0, 243, 255, 0.15) 1px, transparent 1px),
                linear-gradient(to top, rgba(0, 243, 255, 0.15) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: rotateX(75deg);
            animation: gridMove 2s linear infinite;
            z-index: -1;
        }
        @keyframes gridMove {
            0% { transform: rotateX(75deg) translateY(0); }
            100% { transform: rotateX(75deg) translateY(50px); }
        }

        /* 3D HUD Container */
        .hud-wrapper {
            transition: transform 0.1s ease-out;
            transform-style: preserve-3d;
        }
        .hud-container {
            background: rgba(5, 5, 16, 0.85);
            border: 2px solid var(--neon-cyan);
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.2), inset 0 0 20px rgba(0, 243, 255, 0.1);
            border-radius: 10px;
            padding: 35px;
            width: 500px;
            backdrop-filter: blur(10px);
            transform: translateZ(50px); /* Pops out from the background */
        }
        h1 {
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 0 10px var(--neon-cyan);
            margin-top: 0;
            margin-bottom: 30px;
        }
        
        /* Inputs and Buttons */
        .input-group { display: flex; gap: 15px; margin-bottom: 30px; }
        input[type="text"] {
            flex: 1;
            background: rgba(0, 243, 255, 0.05);
            border: 1px solid var(--neon-cyan);
            color: #fff;
            padding: 15px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            outline: none;
            border-radius: 4px;
            box-shadow: inset 0 0 10px rgba(0, 243, 255, 0.1);
        }
        input[type="text"]:focus {
            box-shadow: 0 0 15px var(--neon-cyan), inset 0 0 15px var(--neon-cyan);
            background: rgba(0, 243, 255, 0.1);
        }
        button {
            background: var(--neon-cyan);
            color: var(--dark-bg);
            border: none;
            padding: 0 25px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 1.2rem;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
            text-transform: uppercase;
        }
        button:hover {
            background: #fff;
            box-shadow: 0 0 20px var(--neon-cyan);
            transform: scale(1.05);
        }
        
        /* Mission Log Items */
        .task-list { list-style: none; padding: 0; margin: 0; }
        .task-item {
            background: rgba(0, 243, 255, 0.05);
            border-left: 4px solid var(--neon-cyan);
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
        }
        .task-item:hover {
            background: rgba(0, 243, 255, 0.15);
            transform: translateX(10px);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.2);
        }
        .task-content { display: flex; align-items: center; gap: 15px; }
        .task-text { color: #fff; letter-spacing: 1px; font-size: 0.95rem; }
        
        .btn-status { color: var(--neon-cyan); font-size: 1.6rem; text-decoration: none; display: flex; transition: all 0.2s; }
        .btn-status:hover { text-shadow: 0 0 15px var(--neon-cyan); transform: scale(1.1); }
        
        /* Mission Completed State */
        .completed { border-left-color: var(--neon-pink); background: rgba(255, 0, 234, 0.05); }
        .completed .btn-status { color: var(--neon-pink); }
        .completed .btn-status:hover { text-shadow: 0 0 15px var(--neon-pink); }
        .completed .task-text { text-decoration: line-through; opacity: 0.5; }
        
        .btn-delete {
            color: var(--neon-pink);
            font-size: 1.5rem;
            text-decoration: none;
            opacity: 0.3;
            transition: all 0.2s;
        }
        .task-item:hover .btn-delete { opacity: 1; }
        .btn-delete:hover { text-shadow: 0 0 15px var(--neon-pink); transform: scale(1.2); color: #fff; }
    </style>
</head>
<body>
    <div class="grid-floor"></div>
    
    <div class="hud-wrapper" id="hudWrapper">
        <div class="hud-container">
            <h1>Mission Log</h1>
            <form method="POST" class="input-group">
                {% csrf_token %}
                <input type="text" name="title" placeholder="ENTER OBJECTIVE..." required autocomplete="off">
                <button type="submit">ADD</button>
            </form>
            <ul class="task-list">
                {% for task in tasks %}
                <li class="task-item {% if task.completed %}completed{% endif %}">
                    <div class="task-content">
                        <a href="{% url 'toggle_task' task.id %}" class="btn-status">
                            {% if task.completed %}
                                <i class="ph-fill ph-check-circle"></i>
                            {% else %}
                                <i class="ph ph-circle"></i>
                            {% endif %}
                        </a>
                        <span class="task-text">{{ task.title }}</span>
                    </div>
                    <a href="{% url 'delete_task' task.id %}" class="btn-delete">
                        <i class="ph-bold ph-x-square"></i>
                    </a>
                </li>
                {% empty %}
                <div style="text-align: center; padding: 20px; color: rgba(0, 243, 255, 0.4);">
                    <p>NO ACTIVE MISSIONS IN SECTOR.</p>
                </div>
                {% endfor %}
            </ul>
        </div>
    </div>

    <script>
        // 3D Parallax Mouse Tracking Effect
        const wrapper = document.getElementById('hudWrapper');
        document.addEventListener('mousemove', (e) => {
            const xAxis = (window.innerWidth / 2 - e.pageX) / 25;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 25;
            wrapper.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });
        
        // Reset tilt position when mouse leaves the browser window
        document.addEventListener('mouseleave', () => {
            wrapper.style.transform = 'rotateY(0deg) rotateX(0deg)';
        });
    </script>
</body>
</html>
