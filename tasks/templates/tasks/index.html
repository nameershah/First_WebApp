<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Task Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --danger: #ef4444;
            --success: #10b981;
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 10vh;
        }
        .app-container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 480px;
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 2rem;
        }
        .header i { font-size: 2rem; color: var(--primary); }
        h1 { margin: 0; font-weight: 600; font-size: 1.75rem; letter-spacing: -0.5px; }
        
        .input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 2rem;
        }
        input[type="text"] {
            flex: 1;
            background: #0f172a;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 14px 18px;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
            font-family: inherit;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }
        .btn-add {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 0 20px;
            font-size: 1.25rem;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-add:hover { background: var(--primary-hover); transform: scale(1.05); }
        
        .task-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 12px; }
        .task-item {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 16px 20px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.2s ease;
        }
        .task-item:hover { background: rgba(255,255,255,0.05); transform: translateY(-2px); }
        
        .task-content { display: flex; align-items: center; gap: 16px; flex: 1; }
        .task-text { font-size: 1rem; font-weight: 500; transition: all 0.3s ease; }
        
        .btn-status {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 1.5rem;
            display: flex;
            transition: color 0.2s;
        }
        .btn-status:hover { color: var(--primary); }
        .completed .btn-status { color: var(--success); }
        .completed .task-text { text-decoration: line-through; color: var(--text-muted); }
        
        .btn-delete {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 1.25rem;
            opacity: 0;
            transition: all 0.2s ease;
            padding: 8px;
            border-radius: 8px;
        }
        .task-item:hover .btn-delete { opacity: 1; }
        .btn-delete:hover { color: var(--danger); background: rgba(239, 68, 68, 0.1); }

        .empty-state {
            text-align: center;
            padding: 3rem 0;
            color: var(--text-muted);
        }
        .empty-state i { font-size: 3rem; margin-bottom: 1rem; opacity: 0.5; }
        .empty-state p { margin: 0; font-size: 0.95rem; font-weight: 500; }
    </style>
</head>
<body>
    <div class="app-container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <span style="color: #94a3b8; font-size: 0.95rem;">Hi, <strong>{{ request.user.username }}</strong></span>
            <form method="POST" action="{% url 'logout' %}" style="margin: 0;">
                {% csrf_token %}
                <button type="submit" style="background: none; border: none; color: #ef4444; font-family: inherit; font-weight: 600; cursor: pointer; padding: 0;">Log Out</button>
            </form>
        </div>        <div class="header">
            <i class="ph-fill ph-check-square-offset"></i>
            <h1>Tasks</h1>
        </div>

        <form method="POST" class="input-group">
            {% csrf_token %}
            <input type="text" name="title" placeholder="Write a new task..." required autocomplete="off">
            <button type="submit" class="btn-add"><i class="ph-bold ph-plus"></i></button>
        </form>

        <ul class="task-list">
            {% for task in tasks %}
            <li class="task-item {% if task.completed %}completed{% endif %}">
                <div class="task-content">
                    <a href="{% url 'toggle_task' task.id %}" class="btn-status">
                        {% if task.completed %}
                            <i class="ph-fill ph-check-circle"></i>
                        {% else %}
                            <i class="ph ph-circle"></i>
                        {% endif %}
                    </a>
                    <span class="task-text">{{ task.title }}</span>
                </div>
                <a href="{% url 'delete_task' task.id %}" class="btn-delete" title="Delete Task">
                    <i class="ph-bold ph-trash"></i>
                </a>
            </li>
            {% empty %}
            <div class="empty-state">
                <i class="ph-duotone ph-coffee"></i>
                <p>You're all caught up! Time to relax.</p>
            </div>
            {% endfor %}
        </ul>
    </div>
</body>
</html>
