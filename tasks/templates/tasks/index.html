<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stunning Task Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
        }
        .glass-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            padding: 2.5rem;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }
        h1 { margin-top: 0; font-weight: 600; font-size: 2rem; text-align: center; margin-bottom: 2rem; }
        form { display: flex; gap: 10px; margin-bottom: 2rem; }
        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border-radius: 8px;
            border: none;
            outline: none;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 1rem;
        }
        input[type="text"]::placeholder { color: rgba(255, 255, 255, 0.7); }
        button {
            padding: 12px 24px;
            border-radius: 8px;
            border: none;
            background: #fff;
            color: #764ba2;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }
        button:hover { background: #f0f0f0; transform: translateY(-2px); }
        .task-list { list-style: none; padding: 0; margin: 0; }
        .task-item {
            background: rgba(255, 255, 255, 0.15);
            margin-bottom: 10px;
            padding: 16px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }
        .task-item.completed span { text-decoration: line-through; opacity: 0.6; }
        .actions a { text-decoration: none; padding: 6px 12px; border-radius: 6px; font-size: 0.85rem; font-weight: 600; transition: background 0.2s; margin-left: 5px; }
        .btn-toggle { background: rgba(255, 255, 255, 0.2); color: white; }
        .btn-toggle:hover { background: rgba(255, 255, 255, 0.3); }
        .btn-delete { background: rgba(255, 99, 132, 0.2); color: #ffb3c1; }
        .btn-delete:hover { background: rgba(255, 99, 132, 0.4); }
    </style>
</head>
<body>
    <div class="glass-container">
        <h1>Task Manager</h1>
        <form method="POST">
            {% csrf_token %}
            <input type="text" name="title" placeholder="What needs to be done?" required autocomplete="off">
            <button type="submit">Add</button>
        </form>
        <ul class="task-list">
            {% for task in tasks %}
            <li class="task-item {% if task.completed %}completed{% endif %}">
                <span>{{ task.title }}</span>
                <div class="actions">
                    <a href="{% url 'toggle_task' task.id %}" class="btn-toggle">{% if task.completed %}Undo{% else %}Done{% endif %}</a>
                    <a href="{% url 'delete_task' task.id %}" class="btn-delete">Delete</a>
                </div>
            </li>
            {% endfor %}
        </ul>
    </div>
</body>
</html>
